<!-- Doja Garden Menu Component -->
<style>
  .doja-container { background: #0a0a0a; color: #d4af37; padding: 20px; font-family: sans-serif; }
  .product-row { border-bottom: 1px solid #333; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
  .btn-order { background: #d4af37; color: #000; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
</style>

<div class="doja-container">
  <h2>THE DOJA GARDEN</h2>
  
  <!-- Example Product Rows -->
  <div class="product-row">
    <span>Cheese (0.5G)</span>
    <button class="btn-order" onclick="placeOrder('Cheese', '0.5G', 'R50')">R50</button>
  </div>
  
  <div class="product-row">
    <span>Cheese (1G)</span>
    <button class="btn-order" onclick="placeOrder('Cheese', '1G', 'R80')">R80</button>
  </div>
</div>

<script>
function placeOrder(item, weight, price) {
  // WhatsApp Number: 079 414 1922
  const phoneNumber = "27794141922"; 
  const message = `Yo King, I'd like to place an order of ${weight} of ${item} for ${price}.`;
  const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
  
  window.open(whatsappUrl, '_blank');
}
</script>
