<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DOJA GARDEN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="cart-nav">
        <button onclick="toggleView('menu')">Menu</button>
        <button onclick="toggleView('cart-section')">Cart</button>
    </header>

    <main id="menu">
        <h1>THE DOJA GARDEN</h1>
        <h3>GREENHOUSE</h3>
        <div class="product-row"><span onclick="showProduct('Skywalker OG', 'images/skywalker.jpg')">Skywalker OG (0.5G)</span><button onclick="addToCart('Skywalker OG 0.5G', 50)">R50</button></div>
        <div class="product-row"><span onclick="showProduct('Skywalker OG', 'images/skywalker.jpg')">Skywalker OG (1G)</span><button onclick="addToCart('Skywalker OG 1G', 80)">R80</button></div>
        <div class="product-row"><span onclick="showProduct('Cheese', 'images/cheese.jpg')">Cheese (0.5G)</span><button onclick="addToCart('Cheese 0.5G', 50)">R50</button></div>
        <div class="product-row"><span onclick="showProduct('Cheese', 'images/cheese.jpg')">Cheese (1G)</span><button onclick="addToCart('Cheese 1G', 80)">R80</button></div>
        
        <h3>AAA INDOOR</h3>
        <div class="product-row"><span onclick="showProduct('Isaiah', 'images/isaiah.jpg')">Isaiah (0.5G)</span><button onclick="addToCart('Isaiah 0.5G', 60)">R60</button></div>
        <div class="product-row"><span onclick="showProduct('Isaiah', 'images/isaiah.jpg')">Isaiah (1G)</span><button onclick="addToCart('Isaiah 1G', 100)">R100</button></div>

        <h3>PRE-ROLLS</h3>
        <div class="product-row"><span onclick="showProduct('El pancho/ Wifi joints', 'images/joints.jpg')">El pancho/ Wifi joints</span><button onclick="addToCart('El pancho/ Wifi joints', 80)">R80</button></div>

        <h3>SHROOMS</h3>
        <div class="product-row"><span onclick="showProduct('Albino penis envy', 'images/shrooms.jpg')">Albino penis envy (1G)</span><button onclick="addToCart('Albino penis envy 1G', 100)">R100</button></div>
    </main>

    <div id="cart-section" class="hidden">
        <h2>Your Cart</h2>
        <div id="cart-items"></div>
        <button onclick="checkout()">Checkout Now</button>
    </div>

    <div id="product-modal" class="hidden">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <img id="modal-img" src="" alt="Product">
            <button onclick="closeModal()">Back to Menu</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
